name: Build and Push Docker Image

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # First verify the tag matches the code version
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract version from code
        id: code-version
        run: |
          CODE_VERSION=$(python -c "from cityfetch import __version__; print(__version__)")
          echo "version=$CODE_VERSION" >> $GITHUB_OUTPUT
          echo "Code version: $CODE_VERSION"

      - name: Verify tag matches code version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          CODE_VERSION=${{ steps.code-version.outputs.version }}
          
          echo "Git tag: $TAG"
          echo "Code version: $CODE_VERSION"
          
          if [ "$TAG" != "$CODE_VERSION" ]; then
            echo "ERROR: Git tag ($TAG) does not match code version ($CODE_VERSION)!"
            echo "The tag MUST match the version in cityfetch/__init__.py"
            exit 1
          fi
          
          echo "✅ Tag matches code version"

      - name: Verify tag is immutable
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          
          # Check if this tag was already pushed to the registry
          # This prevents re-tagging the same version
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          REGISTRY_IMAGE="${{ env.REGISTRY }}/${IMAGE_NAME}"
          
          # Try to pull the existing image with this tag
          if docker pull $REGISTRY_IMAGE:$TAG 2>/dev/null; then
            echo "ERROR: Docker image $REGISTRY_IMAGE:$TAG already exists!"
            echo "Versions are immutable - you cannot re-release version $TAG"
            echo "Please bump the version in cityfetch/__init__.py and create a new tag"
            exit 1
          fi
          
          echo "✅ Version $TAG is new and can be released"

  build-docker:
    needs: verify-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase image name
        id: vars
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.vars.outputs.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

    #   - name: Test Docker image
    #     run: |
    #       docker run --rm ${{ env.REGISTRY }}/${{ steps.vars.outputs.IMAGE_NAME }}:${{ github.ref_name }} python main.py version

      - name: Create Release Notes
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
