version: "3.8"

# ==========================================
# SINGLE RUN MODE
# Run once and exit - for CI/CD or manual triggers
# ==========================================

services:
  cityfetch:
    image: ghcr.io/filip/cds-cityfetch:latest
    container_name: cityfetch_single
    environment:
      # Required: Languages to fetch
      - LANGUAGES=en,de,fr
      
      # Optional: Output format
      - OUTPUT_FORMAT=sql
      
      # REQUIRED: 0DAYS = run once and exit
      - SCHEDULE=0DAYS
      
      # Optional: Enable verbose output
      - VERBOSE=true
    volumes:
      - ./output:/data
    # Container exits after successful completion
    # Check exit code: docker wait cityfetch_single
