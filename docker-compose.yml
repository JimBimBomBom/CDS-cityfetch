version: "3.8"

services:
  # ==========================================
  # WEEKLY SCHEDULED FETCH (Default)
  # Runs every 7 days by default
  # ==========================================
  cityfetch-weekly:
    image: ghcr.io/filip/cds-cityfetch:latest
    container_name: cityfetch_weekly
    environment:
      # Required: Languages to fetch
      - LANGUAGES=en,de,fr
      
      # Optional: Output format (sql, json, csv)
      - OUTPUT_FORMAT=sql
      
      # Optional: Schedule (0DAYS=once, 7DAYS=weekly, 30DAYS=monthly)
      - SCHEDULE=7DAYS
      
      # Optional: Webhook notification after fetch
      # - WEBHOOK_URL=http://your-app:8080/reload
      # - WEBHOOK_SECRET=your-secret-token
      
      # Optional: Performance tuning
      - BATCH_SIZE=1000
      - MAX_PAGES=40
      - PAGE_SIZE=500
      - VERBOSE=true
    volumes:
      # Mount host directory to container output
      - ./output:/data
    restart: unless-stopped
    # Container stays alive and loops based on SCHEDULE
    # Logs: docker logs cityfetch_weekly -f

  # ==========================================
  # SINGLE RUN (One-shot execution)
  # Uncomment to run once and exit
  # ==========================================
  # cityfetch-once:
  #   image: ghcr.io/filip/cds-cityfetch:latest
  #   container_name: cityfetch_once
  #   environment:
  #     - LANGUAGES=en
  #     - OUTPUT_FORMAT=sql
  #     - SCHEDULE=0DAYS  # 0DAYS = run once and exit
  #     - VERBOSE=true
  #   volumes:
  #     - ./output:/data
  #   # No restart - container exits after one run

  # ==========================================
  # DAILY FETCH
  # Uncomment for daily updates
  # ==========================================
  # cityfetch-daily:
  #   image: ghcr.io/filip/cds-cityfetch:latest
  #   container_name: cityfetch_daily
  #   environment:
  #     - LANGUAGES=en,de,fr,es,it
  #     - OUTPUT_FORMAT=sql
  #     - SCHEDULE=1DAYS  # Every day
  #     - VERBOSE=true
  #   volumes:
  #     - ./output:/data
  #   restart: unless-stopped

  # ==========================================
  # JSON OUTPUT WITH WEBHOOK
  # Uncomment to fetch JSON and notify app
  # ==========================================
  # cityfetch-json-webhook:
  #   image: ghcr.io/filip/cds-cityfetch:latest
  #   container_name: cityfetch_json
  #   environment:
  #     - LANGUAGES=en
  #     - OUTPUT_FORMAT=json
  #     - SCHEDULE=7DAYS
  #     - WEBHOOK_URL=http://your-app:8080/api/data-updated
  #     - WEBHOOK_SECRET=your-secret-here
  #     - VERBOSE=true
  #   volumes:
  #     - ./output:/data
  #   restart: unless-stopped
  #   networks:
  #     - your-app-network  # Connect to your app's network

networks:
  default:
    name: cityfetch-network
  # your-app-network:
  #   external: true  # Use existing network
